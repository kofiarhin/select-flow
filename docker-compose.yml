services:
  mongo:
    image: mongo:7
    ports: ["27017:27017"]
    volumes: ["mongo_data:/data/db"]
  server:
    build:
      context: .
      dockerfile: server/Dockerfile
    env_file: .env
    ports: ["5000:5000"]
    depends_on: [mongo]
    volumes: [".:/app"]
    command: npm run start
  client:
    build:
      context: .
      dockerfile: client/Dockerfile
    env_file: client/.env
    ports: ["4000:4000"]
    depends_on: [server]
volumes:
  mongo_data:
